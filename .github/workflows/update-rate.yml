name: Update Exchange Rate

on:
  schedule:
    # تشغيل السكربت كل 12 ساعة (عند الدقيقة 0)
    - cron: '0 */12 * * *'
  # السماح بتشغيل السكربت يدوياً من واجهة جيت هاب إذا لزم الأمر
  workflow_dispatch:

jobs:
  update-rate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest rate
        run: node fetch-rate.js

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add rate.json
          # التحقق مما إذا كان هناك تغيير في السعر قبل عمل Commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "تحديث تلقائي لسعر الصرف [skip ci]" && git push)
